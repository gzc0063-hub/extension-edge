[server]
headless = true
runOnSave = false
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#E87722"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F7F3EF"
textColor = "#0C2340"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "minimal"
